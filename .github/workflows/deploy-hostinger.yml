name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hostinger-production
  cancel-in-progress: false

jobs:
  test:
    name: Automated integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ddu_test_root_password
          MYSQL_DATABASE: ddu_integration_test
          MYSQL_USER: ddu_test_user
          MYSQL_PASSWORD: ddu_test_user_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -pddu_test_root_password"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup PHP test runtime
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_mysql, mbstring, dom, fileinfo, gd, zip
          coverage: none
          tools: none
        env:
          fail-fast: true

      - name: Validate source files
        shell: bash
        run: |
          set -euo pipefail
          find frontend -type f -name '*.js' -print0 | xargs -0 -n1 node --check
          find frontend backend tests -type f -name '*.php' -print0 | xargs -0 -n1 php -l
          bash -n tests/integration.sh

      - name: Prepare isolated test database
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p backend/config backend/storage/logs backend/storage/cache backend/storage/security backend/storage/backups frontend/uploads
          printf '%s\n' \
            'APP_ENV=testing' \
            'APP_URL=http://127.0.0.1:8080' \
            'DB_HOST=127.0.0.1' \
            'DB_PORT=3306' \
            'DB_NAME=ddu_integration_test' \
            'DB_USER=ddu_test_user' \
            'DB_PASS=ddu_test_user_password' \
            'ADMIN_SETUP_ENABLED=false' \
            'ADMIN_SETUP_KEY=integration-test-key-not-for-production' \
            'BACKUP_RETENTION=3' \
            'KEEP_UPLOAD_ORIGINAL=false' \
            'LOG_MAX_SIZE_MB=1' \
            'LOG_RETENTION_FILES=2' > backend/config/.env
          php tests/prepare-test-db.php

      - name: Run HTTP integration tests
        shell: bash
        run: |
          set -euo pipefail
          server_log="$RUNNER_TEMP/ddu-test-server.log"
          php -S 127.0.0.1:8080 -t frontend tests/router.php > "$server_log" 2>&1 &
          server_pid=$!
          cleanup() {
            kill "$server_pid" 2>/dev/null || true
            wait "$server_pid" 2>/dev/null || true
          }
          trap cleanup EXIT

          ready=false
          for attempt in {1..20}; do
            if curl --fail --silent --show-error http://127.0.0.1:8080/health.php > /dev/null; then
              ready=true
              break
            fi
            sleep 1
          done
          if [ "$ready" != true ]; then
            cat "$server_log"
            exit 1
          fi

          if ! TEST_BASE_URL=http://127.0.0.1:8080 bash tests/integration.sh; then
            cat "$server_log"
            exit 1
          fi

  deploy:
    name: Deploy production
    needs: test
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Validate JavaScript
        shell: bash
        run: |
          set -euo pipefail
          find frontend -type f -name '*.js' -print0 | xargs -0 -n1 node --check

      - name: Validate PHP
        shell: bash
        run: |
          set -euo pipefail
          find frontend backend -type f -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Configure SSH
        shell: bash
        env:
          SSH_PRIVATE_KEY_B64: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY_B64 }}
          SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          SSH_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
        run: |
          set -euo pipefail
          install -d -m 700 ~/.ssh
          # Base64 menjaga private key tetap utuh saat disimpan sebagai GitHub Secret.
          printf '%s' "$SSH_PRIVATE_KEY_B64" | base64 --decode > ~/.ssh/hostinger_deploy
          chmod 600 ~/.ssh/hostinger_deploy
          ssh-keygen -y -f ~/.ssh/hostinger_deploy > /dev/null
          scan_file="$(mktemp)"
          for attempt in 1 2 3 4 5; do
            if ssh-keyscan -T 10 -p "$SSH_PORT" -H "$SSH_HOST" > "$scan_file" 2>/dev/null && [ -s "$scan_file" ]; then
              cat "$scan_file" >> ~/.ssh/known_hosts
              rm -f "$scan_file"
              break
            fi

            if [ "$attempt" -eq 5 ]; then
              rm -f "$scan_file"
              echo "Gagal mengambil host key SSH setelah 5 percobaan."
              exit 1
            fi

            echo "SSH belum merespons, mencoba kembali ($attempt/5)..."
            sleep $((attempt * 2))
          done

      - name: Prepare and verify remote directories
        shell: bash
        env:
          SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          SSH_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
          SSH_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          DOMAIN_ROOT: ${{ secrets.HOSTINGER_DOMAIN_ROOT }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/hostinger_deploy -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "test -d '$DOMAIN_ROOT/public_html' && mkdir -p '$DOMAIN_ROOT/backend/storage/logs' '$DOMAIN_ROOT/backend/storage/cache' '$DOMAIN_ROOT/backend/storage/security' '$DOMAIN_ROOT/backend/storage/backups' && rm -f '$DOMAIN_ROOT/public_html/setup-admin.php'"

      - name: Deploy public frontend
        shell: bash
        env:
          SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          SSH_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
          SSH_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          DOMAIN_ROOT: ${{ secrets.HOSTINGER_DOMAIN_ROOT }}
        run: |
          set -euo pipefail
          rsync -az --checksum \
            --exclude='/uploads/***' \
            --exclude='/setup-admin.php' \
            -e "ssh -i ~/.ssh/hostinger_deploy -p $SSH_PORT" \
            frontend/ "$SSH_USER@$SSH_HOST:$DOMAIN_ROOT/public_html/"

      - name: Deploy private backend
        shell: bash
        env:
          SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          SSH_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
          SSH_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          DOMAIN_ROOT: ${{ secrets.HOSTINGER_DOMAIN_ROOT }}
        run: |
          set -euo pipefail
          rsync -az --checksum \
            --exclude='/config/.env' \
            --exclude='/storage/logs/***' \
            --exclude='/storage/cache/***' \
            --exclude='/storage/security/***' \
            --exclude='/storage/backups/***' \
            -e "ssh -i ~/.ssh/hostinger_deploy -p $SSH_PORT" \
            backend/ "$SSH_USER@$SSH_HOST:$DOMAIN_ROOT/backend/"

      - name: Verify production API
        shell: bash
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
        run: |
          set -euo pipefail
          health="$(curl --fail --silent --show-error \
            --retry 3 --retry-delay 3 \
            "${SITE_URL%/}/health.php")"
          grep -q '"status":"healthy"' <<< "$health"

          curl --fail --silent --show-error \
            --retry 3 --retry-delay 3 \
            "${SITE_URL%/}/api/index.php?resource=session"
          curl --fail --silent --show-error \
            --retry 3 --retry-delay 3 \
            "${SITE_URL%/}/api/index.php?resource=gold_price"
          curl --fail --silent --show-error \
            --retry 3 --retry-delay 3 \
            "${SITE_URL%/}/api/index.php?resource=institution"

          setup_status="$(curl --silent --output /dev/null --write-out '%{http_code}' \
            "${SITE_URL%/}/setup-admin.php")"
          test "$setup_status" = "404"

          headers="$(curl --fail --silent --show-error --head "${SITE_URL%/}/")"
          grep -qi '^strict-transport-security:' <<< "$headers"
          grep -qi '^content-security-policy:' <<< "$headers"

          sitemap="$(curl --fail --silent --show-error \
            --retry 3 --retry-delay 3 "${SITE_URL%/}/sitemap.xml")"
          grep -q '<urlset' <<< "$sitemap"
          grep -q "${SITE_URL%/}" <<< "$sitemap"

          robots="$(curl --fail --silent --show-error "${SITE_URL%/}/robots.txt")"
          grep -qi '^Sitemap:.*sitemap.xml' <<< "$robots"

          not_found_status="$(curl --silent --output /dev/null --write-out '%{http_code}' \
            "${SITE_URL%/}/halaman-tidak-ditemukan-seo")"
          test "$not_found_status" = "404"
