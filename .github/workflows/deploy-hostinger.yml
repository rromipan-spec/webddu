name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hostinger-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy production
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Validate JavaScript
        shell: bash
        run: |
          set -euo pipefail
          find frontend -type f -name '*.js' -print0 | xargs -0 -n1 node --check

      - name: Validate PHP
        shell: bash
        run: |
          set -euo pipefail
          find frontend backend -type f -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Configure SSH
        shell: bash
        env:
          SSH_PRIVATE_KEY_B64: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY_B64 }}
          SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          SSH_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
        run: |
          set -euo pipefail
          install -d -m 700 ~/.ssh
          # Base64 menjaga private key tetap utuh saat disimpan sebagai GitHub Secret.
          printf '%s' "$SSH_PRIVATE_KEY_B64" | base64 --decode > ~/.ssh/hostinger_deploy
          chmod 600 ~/.ssh/hostinger_deploy
          ssh-keygen -y -f ~/.ssh/hostinger_deploy > /dev/null
          scan_file="$(mktemp)"
          for attempt in 1 2 3 4 5; do
            if ssh-keyscan -T 10 -p "$SSH_PORT" -H "$SSH_HOST" > "$scan_file" 2>/dev/null && [ -s "$scan_file" ]; then
              cat "$scan_file" >> ~/.ssh/known_hosts
              rm -f "$scan_file"
              break
            fi

            if [ "$attempt" -eq 5 ]; then
              rm -f "$scan_file"
              echo "Gagal mengambil host key SSH setelah 5 percobaan."
              exit 1
            fi

            echo "SSH belum merespons, mencoba kembali ($attempt/5)..."
            sleep $((attempt * 2))
          done

      - name: Prepare and verify remote directories
        shell: bash
        env:
          SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          SSH_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
          SSH_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          DOMAIN_ROOT: ${{ secrets.HOSTINGER_DOMAIN_ROOT }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/hostinger_deploy -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "test -d '$DOMAIN_ROOT/public_html' && mkdir -p '$DOMAIN_ROOT/backend/storage/logs' '$DOMAIN_ROOT/backend/storage/cache'"

      - name: Deploy public frontend
        shell: bash
        env:
          SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          SSH_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
          SSH_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          DOMAIN_ROOT: ${{ secrets.HOSTINGER_DOMAIN_ROOT }}
        run: |
          set -euo pipefail
          rsync -az --checksum \
            --exclude='/uploads/***' \
            --exclude='/setup-admin.php' \
            -e "ssh -i ~/.ssh/hostinger_deploy -p $SSH_PORT" \
            frontend/ "$SSH_USER@$SSH_HOST:$DOMAIN_ROOT/public_html/"

      - name: Deploy private backend
        shell: bash
        env:
          SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          SSH_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
          SSH_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          DOMAIN_ROOT: ${{ secrets.HOSTINGER_DOMAIN_ROOT }}
        run: |
          set -euo pipefail
          rsync -az --checksum \
            --exclude='/config/.env' \
            --exclude='/storage/logs/***' \
            --exclude='/storage/cache/***' \
            -e "ssh -i ~/.ssh/hostinger_deploy -p $SSH_PORT" \
            backend/ "$SSH_USER@$SSH_HOST:$DOMAIN_ROOT/backend/"

      - name: Verify production API
        shell: bash
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
        run: |
          set -euo pipefail
          curl --fail --silent --show-error \
            --retry 3 --retry-delay 3 \
            "${SITE_URL%/}/api/index.php?resource=session"
          curl --fail --silent --show-error \
            --retry 3 --retry-delay 3 \
            "${SITE_URL%/}/api/index.php?resource=gold_price"
